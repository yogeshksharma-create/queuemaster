<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Queue Rotation App</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f4f6f8; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
    .card { background:#fff; padding:32px; border-radius:12px; box-shadow:0 4px 14px rgba(0,0,0,0.1); width:340px; }
    h1 { margin-top:0; font-size:24px; }
    input { width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:8px; box-sizing:border-box; }
    button { width:100%; padding:10px; margin-top:10px; border:none; border-radius:8px; background:#2563eb; color:#fff; cursor:pointer; }
    button.secondary { background:#6b7280; }
    #msg { margin-top:14px; white-space:pre-wrap; font-size:14px; }
    .error { color:#b00020; }
    .ok { color:#0a7a35; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Queue Rotation App</h1>
    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />
    <button id="signinBtn">Sign In</button>
    <button id="signupBtn" class="secondary">Sign Up</button>
    <div id="msg"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script>
    const msg = document.getElementById("msg");

    function setMsg(text, cls = "") {
      msg.className = cls;
      msg.textContent = text;
    }

    async function signIn() {
      try {
        if (!window.supabaseClient) {
          setMsg("Supabase client not loaded. Check supabaseClient.js.", "error");
          return;
        }

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        const { data, error } = await window.supabaseClient.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          setMsg(error.message, "error");
          return;
        }

        setMsg("Sign-in successful. Redirecting...", "ok");
        window.location.href = "dashboard.html";
      } catch (e) {
        setMsg(e.message, "error");
        console.error(e);
      }
    }

    async function signUp() {
      try {
        if (!window.supabaseClient) {
          setMsg("Supabase client not loaded. Check supabaseClient.js.", "error");
          return;
        }

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        const { data, error } = await window.supabaseClient.auth.signUp({
          email,
          password
        });

        if (error) {
          setMsg(error.message, "error");
          return;
        }

        setMsg("Account created. Now sign in.", "ok");
      } catch (e) {
        setMsg(e.message, "error");
        console.error(e);
      }
    }

    document.getElementById("signinBtn").addEventListener("click", signIn);
    document.getElementById("signupBtn").addEventListener("click", signUp);
  </script>
</body>
</html>
